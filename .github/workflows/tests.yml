name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"

      - uses: r-lib/actions/setup-renv@v2

      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests", stop_on_failure = TRUE)'
